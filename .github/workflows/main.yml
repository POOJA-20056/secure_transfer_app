name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_push_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v3

      - name: 2. Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 3. Install dependencies
        run: |
          cd secure_transfer_app
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Run Tests
        run: |
          cd secure_transfer_app
          pytest

      - name: 5. Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: 6. Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: 7. Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 8. Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./secure_transfer_app
          file: ./secure_transfer_app/Dockerfile.backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

      - name: 9. Set up Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: 10. Deploy to Kubernetes
        run: |
          kubectl apply -f secure_transfer_app/deployment.yaml
          kubectl apply -f secure_transfer_app/service.yaml

      - name: 11. Deployment Success
        run: |
          echo "CI/CD Pipeline finished successfully. Application is deployed to Kubernetes."
